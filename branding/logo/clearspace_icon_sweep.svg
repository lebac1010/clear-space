<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 3: Vacuum Path Sweep -->
  <defs>
    <linearGradient id="bg3" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#0C254F"/>
      <stop offset="100%" stop-color="#0FA6D9"/>
    </linearGradient>
    <linearGradient id="path" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#DDF7FF" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="cleanZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5CFFC5" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#5CFFC5" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0A1530" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg3)"/>

  <!-- Base plate (phi proportion: 632x392) -->
  <rect x="196" y="316" width="632" height="392" rx="140" fill="rgba(255,255,255,0.06)" filter="url(#shadow3)"/>

  <!-- Sweep stroke (width 120 ~ 632/5.27) -->
  <path d="
    M 220 642
    Q 420 420 612 412
    Q 744 408 804 332
  " stroke="url(#path)" stroke-width="120" stroke-linecap="round" />

  <!-- Clean zone overlay -->
  <path d="
    M 240 660
    Q 436 430 620 420
    Q 760 414 820 332
    L 820 760
    L 240 760 Z
  " fill="url(#cleanZone)"/>

  <!-- Spark + dust dots -->
  <circle cx="786" cy="330" r="34" fill="#FFC857"/>
  <circle cx="360" cy="560" r="14" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="430" cy="500" r="10" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="500" cy="450" r="8" fill="#5CFFC5" opacity="0.7"/>
</svg>
