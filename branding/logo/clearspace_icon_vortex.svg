<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 1: Vortex Clean -->
  <!-- Grid: 1024x1024, golden circle 632px (phi * 1024) centered -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1A2F60"/>
      <stop offset="55%" stop-color="#0F3C8E"/>
      <stop offset="100%" stop-color="#0A2145"/>
    </radialGradient>
    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#137FEC"/>
      <stop offset="100%" stop-color="#1BB3A4"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#0E1626" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Adaptive safe zone squircle -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <!-- Main orb (diameter 632) -->
  <circle cx="512" cy="512" r="316" fill="url(#orb)" filter="url(#shadow)"/>

  <!-- Vortex sweep shaped as an open 'C' (gap on right); thickness ~120 = 316/2.618 -->
  <path d="M 693 331 A 256 256 0 1 0 693 693" fill="none" stroke="url(#sweep)" stroke-width="120" stroke-linecap="round"/>

  <!-- Spark highlights (kept inside arc, away from the open gap) -->
  <circle cx="704" cy="340" r="36" fill="#FFC857"/>
  <circle cx="330" cy="690" r="22" fill="#5CFFC5" opacity="0.75"/>
  <circle cx="598" cy="740" r="14" fill="#FFFFFF" opacity="0.5"/>
</svg>
