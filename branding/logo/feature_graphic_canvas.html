<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Clear Space Feature Graphic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #040B18;
  }

  .canvas {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #040B18 0%, #081221 40%, #0F2847 100%);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* Decorative glowing orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.2;
  }
  .orb1 { width: 400px; height: 400px; background: #49ABFF; top: -150px; right: -50px; }
  .orb2 { width: 300px; height: 300px; background: #5CFFC5; bottom: -100px; left: 20%; opacity: 0.1; }

  /* Subtle tech grid */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image: 
      radial-gradient(circle at 2px 2px, rgba(92, 255, 197, 0.05) 1px, transparent 0);
    background-size: 32px 32px;
  }

  /* Left section: icon */
  .icon-section {
    flex: 0 0 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5;
    padding-left: 20px;
  }

  .icon-container {
    width: 300px;
    height: 300px;
    background: rgba(13, 27, 42, 0.6);
    backdrop-filter: blur(20px);
    border-radius: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 
      0 40px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(73, 171, 255, 0.15);
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
  }

  /* Right content section */
  .content-section {
    flex: 1;
    z-index: 10;
    padding-right: 60px;
    padding-left: 20px;
  }

  .top-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #5CFFC5;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  .app-name {
    font-size: 68px;
    font-weight: 900;
    color: #FFFFFF;
    margin-bottom: 20px;
    white-space: nowrap;
    letter-spacing: -1px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .badge-row {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
  }

  .pill {
    background: rgba(19, 127, 236, 0.2);
    border: 1px solid rgba(73, 171, 255, 0.4);
    color: #49ABFF;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    backdrop-filter: blur(5px);
  }

  .stats-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 25px;
    backdrop-filter: blur(10px);
    width: fit-content;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  }

  .progress-ring {
    position: relative;
    width: 80px;
    height: 80px;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
  }

  .progress-ring circle {
    fill: transparent;
    stroke-width: 9; /* Slightly thicker for sharpness */
  }

  .progress-ring .bg { stroke: rgba(255,255,255,0.08); }
  .progress-ring .active {
    stroke: #5CFFC5;
    stroke-dasharray: 251.2;
    stroke-dashoffset: 75.3; /* 70% filled */
    stroke-linecap: round;
    /* Removed heavy drop-shadow to eliminate blurriness */
    filter: drop-shadow(0 0 2px rgba(92, 255, 197, 0.5));
  }

  .stats-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stats-val {
    font-size: 28px;
    font-weight: 800;
    color: #FFFFFF;
  }

  .stats-lbl {
    font-size: 13px;
    font-weight: 600;
    color: rgba(200, 220, 240, 0.7);
  }

  .feature-labels {
    margin-top: 25px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .feat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
  }

  .feat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5CFFC5;
    box-shadow: 0 0 8px #5CFFC5;
  }

  .accent-lines {
    position: absolute;
    right: 0;
    top: 20%;
    bottom: 20%;
    width: 4px;
    background: linear-gradient(to bottom, transparent, #5CFFC5, transparent);
    opacity: 0.3;
  }

</style>
</head>
<body>
<div class="canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="grid-overlay"></div>
  <div class="accent-lines"></div>

  <div class="icon-section">
    <div class="icon-container">
      <!-- High-fidelity SVG Icon -->
      <svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="icon_bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#040B18"/>
            <stop offset="100%" stop-color="#1E8FFF"/>
          </linearGradient>
          <linearGradient id="shield_fill" x1="30%" y1="0%" x2="70%" y2="100%">
            <stop offset="0%" stop-color="#137FEC"/>
            <stop offset="100%" stop-color="#0FB5A6"/>
          </linearGradient>
          <linearGradient id="ring_stroke" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="#5CFFC5" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#5CFFC5" stop-opacity="0.35"/>
          </linearGradient>
        </defs>
        <rect width="1024" height="1024" rx="220" fill="url(#icon_bg)"/>
        <path d="M 512 212 C 652 212 770 298 770 426 C 770 632 640 760 512 812 C 384 760 254 632 254 426 C 254 298 372 212 512 212 Z" fill="url(#shield_fill)"/>
        <path d="M 512 262 C 632 262 722 330 722 430 C 722 586 612 690 512 732 C 412 690 302 586 302 430 C 302 330 392 262 512 262 Z" fill="rgba(255,255,255,0.08)"/>
        <ellipse cx="512" cy="492" rx="320" ry="196" stroke="url(#ring_stroke)" stroke-width="46" fill="none"/>
        <ellipse cx="512" cy="492" rx="320" ry="196" stroke="#5CFFC5" stroke-opacity="0.1" stroke-width="80" fill="none"/>
        <circle cx="790" cy="462" r="32" fill="#FFD54A"/>
        <circle cx="286" cy="552" r="20" fill="#5CFFC5" opacity="0.8"/>
      </svg>
    </div>
  </div>

  <div class="content-section">
    <div class="top-label">Advanced Storage Cleaner</div>
    <h1 class="app-name">Clear Space</h1>
    
    <div class="badge-row">
      <div class="pill">Phone Cleaner</div>
      <div class="pill">Storage Manager</div>
      <div class="pill">Fast & Secure</div>
    </div>

    <div class="stats-card">
      <div class="progress-ring">
        <svg width="84" height="84">
          <circle class="bg" cx="42" cy="42" r="38"></circle>
          <circle class="active" cx="42" cy="42" r="38"></circle>
        </svg>
      </div>
      <div class="stats-info">
        <div class="stats-val">1.28 GB</div>
        <div class="stats-lbl">Junk Data Identified</div>
      </div>
    </div>

    <div class="feature-labels">
      <div class="feat"><div class="feat-dot"></div><span>Duplicate Removal</span></div>
      <div class="feat"><div class="feat-dot"></div><span>APK Management</span></div>
      <div class="feat"><div class="feat-dot"></div><span>Large File Review</span></div>
      <div class="feat"><div class="feat-dot"></div><span>Deep Scan Tech</span></div>
    </div>
  </div>
</div>
</body>
</html>
