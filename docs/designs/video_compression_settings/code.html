<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
              "surface-light": "#ffffff",
              "surface-dark": "#1e2936",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col relative overflow-x-hidden antialiased">
<!-- Top AppBar -->
<div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark sticky top-0 z-20">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight text-center flex-1 pr-10">Compress Video</h2>
</div>
<!-- Main Content Scrollable Area -->
<div class="flex-1 flex flex-col px-4 pb-32">
<!-- Video Details Card -->
<div class="mt-2 w-full @container">
<div class="flex flex-col rounded-2xl shadow-sm bg-surface-light dark:bg-surface-dark overflow-hidden border border-slate-100 dark:border-slate-800">
<!-- Video Thumbnail -->
<div class="w-full aspect-video bg-cover bg-center relative group" data-alt="Scenic mountain landscape video thumbnail with play overlay" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCAq4YkLn42t2qBJdHw6jj9ALZ_D8gWQ0jX6TaK3NSzrjfBUyWKMtqvILuIZOrXqIiCpKHsgRI8_M2mPA_IMbla603eGYXizrlh-BwTezrC0hAr2S9Kmu3QGT9zvfsVHNn3jW4njqQ3r_tOrDPWfNhFgA3yGERxYGP_slwLj6SMJZoW1XHtKvFNKq6ksBmj8VkzsmBl_gvk6qsfv8N7qbW7aq01TCqorUePZVJmjISy4MQH342kln0ZRb9PTDfJjOfBOqfeKOuKvMs");'>
<div class="absolute inset-0 bg-black/20 group-hover:bg-black/30 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-white text-5xl opacity-90 drop-shadow-md">play_circle</span>
</div>
<div class="absolute bottom-2 right-2 bg-black/60 px-2 py-0.5 rounded text-xs text-white font-medium backdrop-blur-sm">
                        03:42
                    </div>
</div>
<!-- Video Metadata -->
<div class="flex flex-col p-4 gap-3">
<div>
<div class="flex items-center justify-between mb-1">
<p class="text-primary text-xs font-semibold tracking-wide uppercase">Selected Video</p>
</div>
<h3 class="text-lg font-bold leading-tight truncate pr-2">Trip to Yosemite.mp4</h3>
</div>
<div class="flex items-center gap-2 p-3 bg-slate-50 dark:bg-slate-900/50 rounded-lg border border-slate-100 dark:border-slate-800">
<div class="size-8 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-lg">folder_zip</span>
</div>
<div class="flex flex-col">
<span class="text-xs text-slate-500 dark:text-slate-400">Original Size</span>
<span class="text-sm font-semibold">850 MB</span>
</div>
</div>
</div>
</div>
</div>
<!-- Compression Stats -->
<div class="mt-8 mb-6 flex flex-col items-center justify-center">
<div class="flex items-baseline gap-1">
<span class="text-4xl font-bold text-slate-900 dark:text-white tracking-tight">240</span>
<span class="text-xl font-bold text-slate-500 dark:text-slate-400">MB</span>
</div>
<p class="text-primary font-medium text-sm mt-1">Estimated Size (~70% saved)</p>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-4 text-center px-6">
                Choose a compression level below to optimize your storage.
            </p>
</div>
<!-- Segmented Control Buttons -->
<div class="w-full">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1.5">
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-lg px-2 transition-all has-[:checked]:bg-surface-light dark:has-[:checked]:bg-surface-dark has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-500 dark:text-slate-400 font-medium">
<span class="truncate text-sm relative z-10">Balanced</span>
<input checked="" class="peer invisible w-0 h-0 absolute" name="compression_preset" type="radio" value="Balanced"/>
</label>
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-lg px-2 transition-all has-[:checked]:bg-surface-light dark:has-[:checked]:bg-surface-dark has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-500 dark:text-slate-400 font-medium">
<span class="truncate text-sm relative z-10">Max Save</span>
<input class="peer invisible w-0 h-0 absolute" name="compression_preset" type="radio" value="Max Save"/>
</label>
<label class="group relative flex cursor-pointer h-full flex-1 items-center justify-center overflow-hidden rounded-lg px-2 transition-all has-[:checked]:bg-surface-light dark:has-[:checked]:bg-surface-dark has-[:checked]:shadow-sm has-[:checked]:text-primary dark:has-[:checked]:text-primary text-slate-500 dark:text-slate-400 font-medium">
<span class="truncate text-sm relative z-10">High Quality</span>
<input class="peer invisible w-0 h-0 absolute" name="compression_preset" type="radio" value="High Quality"/>
</label>
</div>
</div>
</div>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 z-30">
<button class="w-full h-14 bg-primary hover:bg-blue-600 text-white font-bold rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-blue-500/25 transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined">compress</span>
<span>Compress Now</span>
</button>
</div>
</body></html>
